<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification | Project f0rsakeN</title>
    <style>
        body { background-color: #0c0c0c; color: #ffffff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #151515; padding: 40px; border-radius: 15px; border: 1px solid #222; text-align: center; max-width: 420px; width: 90%; }
        .loader { border: 3px solid #222; border-top: 3px solid #ff4d4d; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 25px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h1 { font-size: 22px; color: #ff4d4d; text-transform: uppercase; }
        p { color: #888; font-size: 14px; }
        .btn { display: inline-block; margin-top: 25px; padding: 12px 25px; background-color: #ff4d4d; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; text-transform: uppercase; }
        #manual-link { display: none; }
    </style>

    <script>
    (() => {
      // URL s apostrofom mora biti pravilno "escaped" ili zapakiran u varijablu
      const myKeyLink = "https://work.ink/2mrY/f0rsakeN's-key-system";
      const myDomain = "https://f0rsaken123.github.io/f0rsakeN-redirector-0/";

      function loadScript(url, callback) {
        var script = document.createElement("script");
        script.type = "text/javascript";
        script.src = url;
        script.onload = callback;
        document.head.appendChild(script);
      }

      loadScript("https://cdn.work.ink/js/workink-sitescript.js", function() {
        // AKTIVACIJA ISKLJUČIVO TVOG KEY SYSTEM LINKA
        if (typeof workink === 'function') {
            workink(myKeyLink, [myDomain], []);
        }
      });
    })();
    </script>
</head>
<body>

    <div id="status-box" class="container">
        <div class="loader"></div>
        <h1>Verifying Access</h1>
        <p>Synchronizing with f0rsakeN Key System...</p>
        
        <div id="manual-link">
            <p>Verification complete. Click below to generate your key:</p>
            <a href="https://work.ink/2mrY/f0rsakeN's-key-system" class="btn">Get Key & Earn $</a>
        </div>
    </div>

    <script>
        const targetKeyLink = "https://work.ink/2mrY/f0rsakeN's-key-system";
        const restartLink = "https://link-center.net/4139494/fSNAbamKOf1O";
        const allowedSources = ["linkvertise.com", "link-hub.net", "link-center.net", "direct-link.net", "link-to.net"];

        setTimeout(function() {
            const ref = document.referrer.toLowerCase();
            const statusBox = document.getElementById("status-box");
            let isVerified = false;

            for (let domain of allowedSources) {
                if (ref.includes(domain)) { isVerified = true; break; }
            }

            // ZA TESTIRANJE: Ako želiš ući bez linkvertise-a dok slažeš stranicu, privremeno stavi 'true'
            if (isVerified) {
                document.getElementById("manual-link").style.display = "block";
                // Automatski preusmjeri na tvoj monetizirani link
                window.location.href = targetKeyLink;
            } else {
                statusBox.innerHTML = `
                    <h1>Access Denied</h1>
                    <p>Referrer check failed. Please go through Linkvertise to support the creator.</p>
                    <a href="${restartLink}" class="btn">Restart Step 1</a>
                `;
            }
        }, 3000);
    </script>
</body>
</html>
