<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification | Project f0rsakeN</title>
    <style>
        body {
            background-color: #0c0c0c;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background: #151515;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 77, 77, 0.1);
            border: 1px solid #222;
            text-align: center;
            max-width: 420px;
            width: 90%;
        }
        .loader {
            border: 3px solid #222;
            border-top: 3px solid #ff4d4d;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 25px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 {
            font-size: 22px;
            color: #ff4d4d;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        p {
            color: #888;
            font-size: 14px;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 25px;
            background-color: #ff4d4d;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.3s ease;
            text-transform: uppercase;
            font-size: 13px;
        }
        .btn:hover {
            background-color: #cc0000;
            box-shadow: 0 0 10px rgba(255, 77, 77, 0.4);
        }
        #manual-link { display: none; }
    </style>

    <script>
    (() => {
      function loadScript(url, callback) {
        var script = document.createElement("script");
        script.type = "text/javascript";
        script.src = url;
        script.onload = callback;
        document.head.appendChild(script);
      }
      loadScript("https://cdn.work.ink/js/workink-sitescript.js", function() {
        workink("https://work.ink/2mrY/f0rsakeN's-key-system", ["https://f0rsaken123.github.io/f0rsakeN-redirector-0/"], []);
      });
    })();
    </script>
</head>
<body>

    <div id="status-box" class="container">
        <div class="loader"></div>
        <h1>Verifying Access</h1>
        <p>Please wait, synchronizing with Work.ink Key System...</p>
        
        <div id="manual-link">
            <p>Verification complete. If you are not redirected automatically, click the button below:</p>
            <a href="https://work.ink/2mrY/f0rsakeN's-key-system" class="btn">Get Your Key</a>
        </div>
    </div>

    <script>
        const targetKeyLink = "https://work.ink/2mrY/f0rsakeN's-key-system";
        const restartLink = "https://link-center.net/4139494/fSNAbamKOf1O";
        const allowedSources = ["linkvertise.com", "link-hub.net", "link-center.net", "direct-link.net", "link-to.net"];

        setTimeout(function() {
            const ref = document.referrer.toLowerCase();
            const statusBox = document.getElementById("status-box");
            let isVerified = false;

            for (let domain of allowedSources) {
                if (ref.includes(domain)) {
                    isVerified = true;
                    break;
                }
            }

            if (isVerified) {
                document.getElementById("manual-link").style.display = "block";
                window.location.href = targetKeyLink;
            } else {
                statusBox.innerHTML = `
                    <h1>Access Denied</h1>
                    <p>Security check failed. You must complete all Linkvertise steps to generate a key.</p>
                    <a href="${restartLink}" class="btn">Restart from Step 1</a>
                `;
            }
        }, 3000);
    </script>
</body>
</html>
