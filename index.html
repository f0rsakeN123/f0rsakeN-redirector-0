<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>f0rsakeN | Secure Redirect</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .loader { border: 4px solid #333; border-top: 4px solid #ff4d4d; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loader-container"><div class="loader"></div><p>Verifying Security...</p></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userKey = urlParams.get('step');
        
        // Brišemo URL bar odmah
        if (window.location.search.length > 0) {
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        // TVOJ NOVI DEPLOYMENT LINK
        const googleUrl = "https://script.google.com/macros/s/AKfycbwTQw-5lJwbWjW-Qb5VfFQRM0rTTwqZjqqrw-I9gEsPQB99264MFHcNGQu2o2hWA78Q/exec";

        async function startRedirect() {
            if (userKey !== "f0rsaken_final_v1") {
                document.body.innerHTML = "<h1>ACCESS DENIED</h1>";
                return;
            }

            try {
                const response = await fetch(googleUrl + "?step=" + userKey);
                const data = await response.json();

                if (data.url) {
                    window.location.replace(data.url);
                } else {
                    document.body.innerHTML = "<h1>API ERROR: Invalid Response</h1>";
                }
            } catch (err) {
                document.body.innerHTML = "<h1>CONNECTION ERROR</h1>";
            }
        }

        startRedirect();
    </script>
</body>
</html>
