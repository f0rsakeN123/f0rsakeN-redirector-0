<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Verification | Project f0rsakeN</title>
    <style>
        body { background-color: #0f0f0f; color: #ffffff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #1a1a1a; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); border: 1px solid #333; text-align: center; max-width: 400px; }
        .loader { border: 3px solid #333; border-top: 3px solid #ff4d4d; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h1 { font-size: 20px; color: #ff4d4d; text-transform: uppercase; }
        .error-btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background-color: #ff4d4d; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>

    <script>
    (() => {
      function loadScript(url, callback) {
        var script = document.createElement("script");
        script.type = "text/javascript";
        script.src = url;
        script.onload = callback;
        document.head.appendChild(script);
      }
      loadScript("https://cdn.work.ink/js/workink-sitescript.js", function() {
        // Ovaj dio aktivira work.ink zaštitu
        workink("https://work.ink/2mrY/f0rsaken-redirector", ["https://f0rsaken123.github.io/f0rsakeN-redirector-0/"], []);
      });
    })();
    </script>
</head>
<body>

    <div id="status-box" class="container">
        <div class="loader"></div>
        <h1>Verifying Access</h1>
        <p>Please wait, verifying your Linkvertise completion through Work.ink API...</p>
        <div id="manual-link" style="margin-top: 20px; display: none;">
            <p>If you aren't redirected, click below:</p>
            <a href="https://work.ink/2mrY/f0rsaken-redirector" class="error-btn">Go to Key System</a>
        </div>
    </div>

    <script>
        // Provjera referrera i automatski redirect
        const allowedDomains = ["linkvertise.com", "link-hub.net", "link-center.net", "direct-link.net", "link-to.net"];
        const firstLink = "https://link-center.net/4139494/fSNAbamKOf1O";

        setTimeout(function() {
            const referrer = document.referrer.toLowerCase();
            let isLegit = false;
            
            for (let domain of allowedDomains) {
                if (referrer.includes(domain)) { isLegit = true; break; }
            }

            if (isLegit) {
                // Pokaži link za svaki slučaj ako Work.ink skripta ne odradi redirect odmah
                document.getElementById("manual-link").style.display = "block";
                // Automatski šaljemo na work.ink
                window.location.href = "https://work.ink/2mrY/f0rsaken-redirector";
            } else {
                document.getElementById("status-box").innerHTML = `
                    <h1>Access Denied</h1>
                    <p>Referrer check failed. Please go through Linkvertise.</p>
                    <a href="${firstLink}" class="error-btn">Restart from Step 1</a>
                `;
            }
        }, 2500);
    </script>
</body>
</html>
