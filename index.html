<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>f0rsakeN | Redirecting...</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .loader { border: 4px solid #333; border-top: 4px solid #ff4d4d; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>

    <script>
        const googleScriptUrl = "https://script.google.com/macros/s/AKfycbyNEp8Tr7cvNlVBD7wwl7buPRoZTSJWL81eskcT1rrj2kktjQzIHj6oic_pK1y4fkTG/exec";

        async function doRedirect() {
            const params = new URLSearchParams(window.location.search);
            const step = params.get('step');

            if (step !== "5") {
                window.location.href = "https://link-center.net/4139494/fSNAbamKOf1O";
                return;
            }

            try {
                const response = await fetch(googleScriptUrl + "?step=5");
                const data = await response.json();

                if (data.response && data.response.url) {
                    window.location.replace(data.response.url);
                } else {
                    document.body.innerHTML = "Error: API failed to generate link.";
                }
            } catch (err) {
                document.body.innerHTML = "System unavailable. Please try again later.";
            }
        }

        doRedirect();
    </script>
</body>
</html>
