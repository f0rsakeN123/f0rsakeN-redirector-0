<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>f0rsakeN | Secure Handshake</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .box { background: #111; padding: 40px; border-radius: 15px; border: 1px solid #333; max-width: 400px; }
        .btn { background: #ff4d4d; color: white; padding: 12px 20px; text-decoration: none; border-radius: 5px; display: inline-block; margin-top: 20px; font-weight: bold; }
        #loader { border: 4px solid #222; border-top: 4px solid #ff4d4d; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="box" id="app">
        <h2 id="title">Security Check</h2>
        <div id="loader"></div>
        <p id="msg">Validating your progress...</p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbyoiSho1KC2MTfpL7m5G1XuRrA0QBEdRPKSrMOOS5nyfwQTYrec3MiSkX6X6AHn_eeHQg/exec";
        
        // KONFIGURACIJA LANCA (Stavi svoje prave linkove ovdje)
        const LINKS = [
            "https://link-center.net/link1", // Ovo je tvoj pravi 1. Linkvertise
            "https://link-center.net/link2", // 2. Linkvertise
            "https://link-center.net/link3", // 3. Linkvertise
            "https://link-center.net/link4", // 4. Linkvertise
            "https://link-center.net/link5"  // 5. Linkvertise (vodi na Stormy)
        ];

        const STEPS = ["Sunny", "Cloudy", "Rainy", "Snowy", "Stormy"];

        function init() {
            const now = Date.now();
            const weather = params.get('Weather');
            
            // 1. Čišćenje URL-a odmah (User ne vidi parametre)
            if (window.location.search) {
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            // 2. Dohvaćanje trenutnog progresa
            let progress = JSON.parse(localStorage.getItem('f0s_chain') || '{"step": 0, "time": 0}');

            // 3. Reset ako je prošlo više od 10 minuta
            if (now - progress.time > 600000) progress = {step: 0, time: 0};

            // 4. Provjera ključne riječi
            const currentRequired = STEPS[progress.step];

            if (weather === currentRequired) {
                // KORAK JE ISPRAVAN
                const nextStep = progress.step + 1;
                localStorage.setItem('f0s_chain', JSON.stringify({step: nextStep, time: now}));

                if (nextStep < STEPS.length) {
                    // Šalji na idući Linkvertise u lancu
                    document.getElementById('msg').innerText = `Step ${nextStep} Verified. Loading next...`;
                    setTimeout(() => window.location.replace(LINKS[nextStep]), 1000);
                } else {
                    // SVIH 5 GOTOVO -> Generiraj ključ
                    generateFinalKey();
                }
            } else {
                // DETEKTIRAN BYPASS (Npr. user je preskočio step ili došao direktno)
                showError("BYPASS DETECTED", "You skipped a step or the session expired.");
            }
        }

        async function generateFinalKey() {
            document.getElementById('msg').innerText = "All steps verified! Generating your key...";
            try {
                const res = await fetch(GOOGLE_URL + "?type=generate");
                const data = await res.json();
                localStorage.removeItem('f0s_chain'); // Čišćenje nakon uspjeha
                
                document.getElementById('app').innerHTML = `
                    <h2 style="color:#4dff4d">Success!</h2>
                    <div style="background:#222; padding:15px; border:1px dashed #4dff4d; font-family:monospace; margin:20px 0;">${data.key}</div>
                    <p style="font-size:0.8em; color:#888;">Key expires in 5 minutes.</p>
                `;
            } catch (e) {
                showError("ERROR", "Key server is offline.");
            }
        }

        function showError(title, msg) {
            document.getElementById('app').innerHTML = `
                <h2 style="color:#ff4d4d">${title}</h2>
                <p>${msg}</p>
                <a href="${LINKS[0]}" class="btn">RETURN TO START</a>
            `;
            localStorage.removeItem('f0s_chain'); // Reset progres pri grešci
        }

        init();
    </script>
</body>
</html>
