<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>f0rsakeN | Secure Handshake</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .box { background: #111; padding: 40px; border-radius: 15px; border: 1px solid #333; max-width: 400px; width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { background: #ff4d4d; color: white; padding: 12px 25px; text-decoration: none; border-radius: 5px; display: inline-block; margin-top: 20px; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #e64040; transform: translateY(-2px); }
        #loader { border: 4px solid #222; border-top: 4px solid #ff4d4d; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .key-display { background: #1a1a1a; padding: 15px; border: 1px dashed #4dff4d; color: #4dff4d; font-family: monospace; margin: 20px 0; font-size: 1.1em; word-break: break-all; }
    </style>
</head>
<body>
    <div class="box" id="app">
        <h2 id="title">Security Check</h2>
        <div id="loader"></div>
        <p id="msg">Validating your progress...</p>
    </div>

    <script>
        const params=new URLSearchParams(window.location.search);
        const GOOGLE_URL="https://script.google.com/macros/s/AKfycbyoiSho1KC2MTfpL7m5G1XuRrA0QBEdRPKSrMOOS5nyfwQTYrec3MiSkX6X6AHn_eeHQg/exec";
        
        const LINKS=["https://link-center.net/4139494/fSNAbamKOf1O", "https://link-target.net/4139494/8adN42HImTDH", "https://link-hub.net/4139494/blMest1Q099l", "https://direct-link.net/4139494/oecbLN5nrwMk", "https://direct-link.net/4139494/ADulfAxLDpvb", "https://work.ink/2mrY/f0rsakeN's-key-system"];
        const STEPS=["Sunny", "Cloudy", "Rainy", "Snowy", "Stormy", "Verified"];
        const MASTER_BYPASS="f0rsakeN10010111010";

        function init()
        {
            const now=Date.now();
            const weather=params.get("Weather");
            
            if(weather===MASTER_BYPASS)
            {
                if(window.location.search)
                    window.history.replaceState({}, document.title, window.location.pathname);
                document.getElementById("msg").innerHTML="<span style='color:#4dff4d'>Admin access detected...</span>";
                generateFinalKey();
                return;
            }

            if(!weather)
            {
                showError("SESSION EXPIRED", "Please start from the first link.");
                return;
            }

            let progress=JSON.parse(localStorage.getItem("f0s_chain") || "{\"step\": 0, \"time\": 0}");

            if(now-progress.time>900000)
                progress={step: 0, time: 0};

            const currentRequired=STEPS[progress.step];

            if(weather===currentRequired)
            {
                const nextStep=progress.step+1;
                localStorage.setItem("f0s_chain", JSON.stringify({step: nextStep, time: now}));

                if(window.location.search)
                    window.history.replaceState({}, document.title, window.location.pathname);

                if(nextStep<STEPS.length)
                {
                    let msg_text;
                    if(nextStep===5)
                        msg_text="Final step: work.ink";
                    else
                        msg_text="Step "+nextStep+" Verified.";
                    
                    document.getElementById("msg").innerHTML=msg_text+"<br><span style=\"color:#888; font-size:0.8em;\">Preparing next stage (3s)...</span>";
                    
                    setTimeout(function(){ window.location.href=LINKS[nextStep]; }, 3000);
                }
                else
                    generateFinalKey();
            }
            else
                showError("BYPASS DETECTED", "Sequence mismatch. Please follow the links in order.");
        }

        async function generateFinalKey()
        {
            document.getElementById("msg").innerText="Generating your unique key...";
            try
            {
                const res=await fetch(GOOGLE_URL+"?type=generate");
                const data=await res.json();
                localStorage.removeItem("f0s_chain");
                
                document.getElementById("app").innerHTML="<h2 style=\"color:#4dff4d\">Access Granted</h2>\n<p>Copy your key below:</p>\n<div class=\"key-display\">"+data.key+"</div>\n<button class=\"btn\" onclick=\"navigator.clipboard.writeText('"+data.key+"').then(()=>alert('Copied!'))\">COPY KEY</button>\n<p style=\"font-size:0.7em; color:#666; margin-top:15px;\">Key expires in 5 minutes.</p>";
            }
            catch(e)
            {
                showError("CONNECTION ERROR", "Could not reach the key server.");
            }
        }

        function showError(title, msg)
        {
            document.getElementById("app").innerHTML="<h2 style=\"color:#ff4d4d\">"+title+"</h2>\n<p>"+msg+"</p>\n<button onclick=\"window.location.href='"+LINKS[0]+"'\" class=\"btn\">RETURN TO START</button>";
            localStorage.removeItem("f0s_chain");
        }

        init();
    </script>
</body>
</html>
